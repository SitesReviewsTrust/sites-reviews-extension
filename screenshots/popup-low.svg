<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <rect width="480" height="480" fill="#FEF2F2"/>
  <g transform="translate(80, 80)" filter="drop-shadow(0 8 24 rgba(15,23,42,0.18))">
    <rect width="320" height="320" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>

    <g transform="translate(20, 24)">
      <circle cx="32" cy="32" r="28" fill="#EF4444"/>
      <text x="32" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">2.1</text>
      <text x="80" y="26" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#17212B">scam-example.com</text>
      <text x="80" y="46" font-family="Inter, sans-serif" font-size="13" fill="#64748B">47 отзывов · 1.1/5</text>
    </g>

    <g transform="translate(20, 105)">
