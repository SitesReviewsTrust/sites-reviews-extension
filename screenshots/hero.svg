<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF3FB"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="480" fill="url(#bgGrad)"/>

  <!-- decorative blur orbs -->
  <circle cx="120" cy="80" r="160" fill="#2A7BFF" opacity="0.10"/>
  <circle cx="1080" cy="420" r="140" fill="#2ECC71" opacity="0.08"/>

  <!-- left text -->
  <text x="60" y="170" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="700" fill="#17212B" letter-spacing="-1">
    Trust Score
  </text>
  <text x="60" y="225" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="700" fill="#17212B" letter-spacing="-1">
    любого сайта —
  </text>
  <text x="60" y="280" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="700" fill="#2A7BFF" letter-spacing="-1">
    прямо в браузере
  </text>
  <text x="60" y="340" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#64748B">
    Расширение Sites.Reviews для Chrome, Firefox и Edge
  </text>

  <!-- mock browser window with badge -->
  <g transform="translate(640, 90)" filter="url(#shadow)">
    <rect width="500" height="300" rx="16" fill="#FFFFFF" stroke="#E5E7EB"/>
    <!-- traffic lights -->
    <circle cx="28" cy="28" r="8" fill="#EF4444"/>
    <circle cx="52" cy="28" r="8" fill="#FFB02E"/>
    <circle cx="76" cy="28" r="8" fill="#2ECC71"/>
    <!-- address bar -->
    <rect x="110" y="16" width="370" height="24" rx="12" fill="#F1F4F6"/>
    <text x="130" y="33" font-family="Inter, monospace" font-size="13" fill="#475569">🔒 example.com</text>
    <!-- extension toolbar -->
    <rect x="420" y="56" width="60" height="40" rx="8" fill="#F1F4F6"/>
    <rect x="440" y="68" width="20" height="20" rx="4" fill="#2A7BFF"/>
    <circle cx="465" cy="73" r="10" fill="#2ECC71"/>
    <text x="465" y="77" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">8.4</text>
    <!-- popup -->
    <g transform="translate(280, 110)">
      <rect width="190" height="170" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
      <circle cx="40" cy="40" r="22" fill="#2ECC71"/>
      <text x="40" y="46" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">8.4</text>
      <text x="75" y="35" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#17212B">Example Inc.</text>
      <text x="75" y="53" font-family="Inter, sans-serif" font-size="11" fill="#64748B">1247 отзывов · 4.2/5</text>
      <rect x="16" y="80" width="158" height="28" rx="6" fill="#2A7BFF"/>
      <text x="95" y="98" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF">Открыть профиль</text>
      <rect x="16" y="118" width="158" height="28" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/>
      <text x="95" y="136" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#17212B">Написать отзыв</text>
    </g>
  </g>
</svg>
