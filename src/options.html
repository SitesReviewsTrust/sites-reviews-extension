<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Sites.Reviews — настройки</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 560px; margin: 40px auto; padding: 0 16px; color: #17212B; }
  h1 { font-size: 20px; }
  label { display: block; margin-top: 16px; font-weight: 500; }
  input[type=text] { width: 100%; padding: 10px 12px; border: 1px solid #E5E7EB; border-radius: 8px; font: inherit; }
  .hint { color: #6B7280; font-size: 13px; margin-top: 6px; }
  button { margin-top: 16px; padding: 10px 18px; background: #2A7BFF; color: #fff; border: 0; border-radius: 8px; font: inherit; cursor: pointer; }
  .saved { color: #2ECC71; margin-left: 12px; }
  a { color: #2A7BFF; }
</style>
</head>
<body>
<h1>Sites.Reviews — настройки</h1>
<form id="form">
  <label>API-ключ
    <input type="text" id="apiKey" placeholder="sr_..." autocomplete="off">
  </label>
  <p class="hint">
    Получить ключ можно у владельца Sites.Reviews. Без ключа расширение не работает.
    <br>Сайт: <a href="https://sites.reviews" target="_blank">sites.reviews</a>
  </p>
  <button type="submit">Сохранить</button>
  <span class="saved" id="saved" hidden>✓ Сохранено</span>
</form>
<script src="options.js"></script>
</body>
</html>
